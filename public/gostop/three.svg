<svg viewBox="0 0 180 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="burst" cx="50%" cy="44%" r="62%">
      <stop offset="0" stop-color="#fff3d0"/><stop offset="1" stop-color="#ffe39a"/>
    </radialGradient>
    <radialGradient id="coin" cx="38%" cy="34%" r="72%">
      <stop offset="0" stop-color="#ffe98a"/><stop offset="1" stop-color="#e0a317"/>
    </radialGradient>
  </defs>

  <!-- 프레임 -->
  <rect x="3" y="3" width="174" height="274" rx="15" fill="url(#burst)" stroke="#e01f26" stroke-width="7"/>
  <rect x="11" y="11" width="158" height="258" rx="10" fill="none" stroke="#e01f26" stroke-width="1.5" opacity="0.4"/>

  <!-- 황금 햇살(광선) -->
  <g transform="translate(90,124)" fill="#ffcf3f" opacity="0.55">
    <g id="ray"><polygon points="0,-86 7,-40 -7,-40"/></g>
    <use href="#ray" transform="rotate(30)"/><use href="#ray" transform="rotate(60)"/>
    <use href="#ray" transform="rotate(90)"/><use href="#ray" transform="rotate(120)"/>
    <use href="#ray" transform="rotate(150)"/><use href="#ray" transform="rotate(180)"/>
    <use href="#ray" transform="rotate(210)"/><use href="#ray" transform="rotate(240)"/>
    <use href="#ray" transform="rotate(270)"/><use href="#ray" transform="rotate(300)"/>
    <use href="#ray" transform="rotate(330)"/>
  </g>

  <!-- 금화 3개 (삼각 배치) -->
  <g stroke="#a9760c" stroke-width="2.5" font-family="'Apple SD Gothic Neo',serif" font-weight="900" text-anchor="middle">
    <g transform="translate(90,96)">
      <circle r="26" fill="url(#coin)"/><circle r="20" fill="none" stroke="#b5810f" stroke-width="1.5"/>
      <text y="9" font-size="26" fill="#8a5a06" stroke="none">福</text>
    </g>
    <g transform="translate(64,142)">
      <circle r="26" fill="url(#coin)"/><circle r="20" fill="none" stroke="#b5810f" stroke-width="1.5"/>
      <text y="9" font-size="26" fill="#8a5a06" stroke="none">福</text>
    </g>
    <g transform="translate(116,142)">
      <circle r="26" fill="url(#coin)"/><circle r="20" fill="none" stroke="#b5810f" stroke-width="1.5"/>
      <text y="9" font-size="26" fill="#8a5a06" stroke="none">福</text>
    </g>
  </g>

  <!-- 쓰리피 배너 -->
  <rect x="20" y="210" width="140" height="40" rx="9" fill="#e8540e"/>
  <rect x="20" y="210" width="140" height="40" rx="9" fill="none" stroke="#ffd34d" stroke-width="2"/>
  <text x="90" y="239" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif"
        font-size="26" font-weight="900" fill="#fff" letter-spacing="1">쓰리피</text>

  <!-- +3 뱃지 -->
  <circle cx="30" cy="32" r="17" fill="#e8540e" stroke="#fff" stroke-width="3"/>
  <text x="30" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="900" fill="#fff">+3</text>
</svg>
