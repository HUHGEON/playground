<svg viewBox="0 0 180 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2a52"/><stop offset="1" stop-color="#3b2a63"/>
    </linearGradient>
    <radialGradient id="moon" cx="40%" cy="38%" r="70%">
      <stop offset="0" stop-color="#fff6c2"/><stop offset="1" stop-color="#f4c64b"/>
    </radialGradient>
  </defs>

  <!-- 프레임 -->
  <rect x="3" y="3" width="174" height="274" rx="15" fill="url(#night)" stroke="#e01f26" stroke-width="7"/>
  <rect x="11" y="11" width="158" height="258" rx="10" fill="none" stroke="#ffd34d" stroke-width="1.5" opacity="0.45"/>

  <!-- 별 -->
  <g fill="#fff" opacity="0.85">
    <circle cx="36" cy="46" r="2"/><circle cx="150" cy="60" r="2.4"/><circle cx="132" cy="34" r="1.6"/>
    <circle cx="48" cy="92" r="1.6"/><circle cx="146" cy="120" r="2"/><circle cx="30" cy="150" r="1.8"/>
  </g>

  <!-- 달 -->
  <circle cx="90" cy="120" r="52" fill="url(#moon)" stroke="#d9a72e" stroke-width="2"/>
  <g fill="#e9b53f" opacity="0.5"><circle cx="70" cy="100" r="7"/><circle cx="108" cy="138" r="9"/><circle cx="112" cy="96" r="5"/></g>

  <!-- 달토끼 2마리 -->
  <g fill="#fff" stroke="#cbd6f0" stroke-width="1">
    <!-- 토끼1 -->
    <g transform="translate(66,120)">
      <ellipse cx="0" cy="10" rx="11" ry="13"/><circle cx="0" cy="-4" r="8"/>
      <ellipse cx="-4" cy="-16" rx="2.6" ry="9" transform="rotate(-12 -4 -16)"/>
      <ellipse cx="4" cy="-16" rx="2.6" ry="9" transform="rotate(12 4 -16)"/>
      <circle cx="-3" cy="-5" r="1.3" fill="#3b2a63" stroke="none"/><circle cx="3" cy="-5" r="1.3" fill="#3b2a63" stroke="none"/>
      <circle cx="0" cy="-1" r="1.3" fill="#ff7aa2" stroke="none"/>
    </g>
    <!-- 토끼2 -->
    <g transform="translate(112,124)">
      <ellipse cx="0" cy="10" rx="11" ry="13"/><circle cx="0" cy="-4" r="8"/>
      <ellipse cx="-4" cy="-16" rx="2.6" ry="9" transform="rotate(-12 -4 -16)"/>
      <ellipse cx="4" cy="-16" rx="2.6" ry="9" transform="rotate(12 4 -16)"/>
      <circle cx="-3" cy="-5" r="1.3" fill="#3b2a63" stroke="none"/><circle cx="3" cy="-5" r="1.3" fill="#3b2a63" stroke="none"/>
      <circle cx="0" cy="-1" r="1.3" fill="#ff7aa2" stroke="none"/>
    </g>
  </g>

  <!-- 투피 배너 -->
  <rect x="22" y="210" width="136" height="40" rx="9" fill="#1aa86b"/>
  <rect x="22" y="210" width="136" height="40" rx="9" fill="none" stroke="#ffd34d" stroke-width="2"/>
  <text x="90" y="239" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif"
        font-size="27" font-weight="900" fill="#fff" letter-spacing="2">투피</text>

  <!-- +2 뱃지 -->
  <circle cx="30" cy="32" r="17" fill="#ffd34d" stroke="#e01f26" stroke-width="3"/>
  <text x="30" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="900" fill="#e01f26">+2</text>
</svg>
