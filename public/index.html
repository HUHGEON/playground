<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎮 playground · 오셀로 · 섯다</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --cell: min(10vw, 56px);
    --bg: #0e1116; --panel: rgba(34,40,52,.72); --panel-brd: rgba(255,255,255,.07);
    --txt: #e9edf4; --muted: #8b9bb0; --accent: #4ea1ff; --green: #2ea05a; --gold: #ffd54a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; gap: 14px; padding: 20px 12px 48px;
    font-family: "Pretendard", system-ui, -apple-system, "Apple SD Gothic Neo", sans-serif;
    color: #f1e9da; -webkit-font-smoothing: antialiased; word-break: keep-all; overflow-wrap: break-word;
    /* 로비 — 따뜻한 다크 허브 */
    background:
      radial-gradient(1200px 700px at 50% -12%, #2a2118 0%, transparent 58%),
      radial-gradient(900px 600px at 88% 116%, #16241c 0%, transparent 55%),
      #131009;
  }
  /* 섯다 — 한지·먹 고급 도박장 */
  body.game-seotda { color: #efe6d4; background:
      radial-gradient(900px 700px at 18% 8%, rgba(40,70,90,.16) 0%, transparent 55%),
      radial-gradient(800px 700px at 84% 92%, rgba(80,40,90,.16) 0%, transparent 55%),
      radial-gradient(700px 500px at 60% 50%, #14110d 0%, #0a0807 80%); }
  /* 오셀로 — 클래식 우드 */
  body.game-othello { color: #f0e6d2; background:
      radial-gradient(900px 700px at 50% -5%, #5a4730 0%, #3a2c1c 58%, #281d11 100%); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 99px; }
  ::-webkit-scrollbar-track { background: transparent; }

  h1 { margin: 2px 0 0; font-size: 38px; font-weight: 800; letter-spacing: -1px; color: #f1e9da; }
  h1 .gr { color: #d9a441; }
  h1 small { font-size: 13px; color: #9a8f7d; letter-spacing: 3px; font-weight: 600; margin-left: 8px; white-space: nowrap; vertical-align: middle; }
  h3 { margin: 0 0 12px; font-size: 13px; color: #8c8170; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .layout { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .panel { background: linear-gradient(180deg, rgba(40,34,25,.85), rgba(28,23,16,.85)); border: 1px solid rgba(255,255,255,.07); border-radius: 18px; padding: 18px; min-width: 240px; backdrop-filter: blur(8px); box-shadow: 0 12px 30px rgba(0,0,0,.30); }
  button { background: linear-gradient(180deg, #37b366, #2a8f50); color: #fff; border: none; padding: 10px 18px; border-radius: 11px; cursor: pointer; font-size: 14px; font-weight: 700; box-shadow: 0 4px 12px rgba(28,140,72,.30); transition: transform .08s, filter .15s, box-shadow .15s; }
  button:hover { filter: brightness(1.08); transform: translateY(-1px); }
  button:active { transform: translateY(0); filter: brightness(.96); }
  button:disabled { background: #2a313c; color: #6f8198; cursor: not-allowed; box-shadow: none; transform: none; filter: none; }
  button.sub { background: linear-gradient(180deg, #46505e, #38414b); box-shadow: 0 4px 12px rgba(0,0,0,.25); }
  button.danger { background: linear-gradient(180deg, #c0492f, #9a3b2f); box-shadow: 0 4px 12px rgba(160,60,40,.30); }
  button.gold { background: linear-gradient(180deg, #e8b13a, #c98e1c); color: #2a1c00; box-shadow: 0 4px 12px rgba(200,150,20,.35); }

  #userbar { background: var(--panel); border: 1px solid var(--panel-brd); padding: 7px 8px 7px 16px; border-radius: 999px; display: none; align-items: center; gap: 10px; }
  input { font-family: inherit; }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(78,161,255,.20); }

  /* 로비 */
  #lobbyView { display: none; }
  .roomrow { display: flex; align-items: center; gap: 13px; padding: 14px 16px; border-radius: 16px; background: linear-gradient(180deg, rgba(40,34,25,.85), rgba(28,23,16,.85)); border: 1px solid rgba(255,255,255,.07); box-shadow: 0 8px 22px rgba(0,0,0,.28); margin-bottom: 10px; transition: border-color .15s, transform .1s; }
  .roomrow:hover { border-color: rgba(217,164,65,.4); transform: translateY(-1px); }
  .roomrow .gicon { width: 46px; height: 46px; border-radius: 13px; flex: none; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: inset 0 0 0 1px rgba(255,255,255,.1); }
  .roomrow .gicon.g-seotda { background: rgba(60,160,100,.18); } .roomrow .gicon.g-othello { background: rgba(120,150,200,.18); }
  .roomrow .rinfo { flex: 1; min-width: 0; }
  .roomrow .rname { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .roomrow .meta { font-size: 12px; color: #9a8f7d; margin-top: 3px; }
  .roomrow button { padding: 9px 18px; font-size: 13px; color: #1a1308; background: linear-gradient(180deg,#e6b54e,#cf962f); box-shadow: 0 4px 12px rgba(200,150,40,.3); }
  .gtag { font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 999px; white-space: nowrap; }
  .gtag.g-seotda { background: rgba(60,160,100,.18); color: #7fd9a8; } .gtag.g-othello { background: rgba(120,150,200,.18); color: #9fc2f0; }
  .badge { font-size: 11px; font-weight: 700; padding: 5px 11px; border-radius: 999px; white-space: nowrap; background: #3a4450; color: #c4d0de; }
  .badge.play { background: linear-gradient(180deg, #6a5420, #4a3a17); color: #ffd97a; }
  #seotdaOpts { display: flex; flex-direction: column; gap: 6px; margin-top: 9px; }
  .optrow { display: flex; gap: 10px; }
  .opthint { font-size: 11px; color: var(--muted); }
  .opthint.err { color: #ff8a7a; font-weight: 700; }
  .optfield { flex: 1; font-size: 12px; color: var(--muted); font-weight: 600; display: flex; flex-direction: column; gap: 4px; }
  .optfield input { padding: 9px 11px; border-radius: 10px; border: 1px solid #3a4350; background: rgba(0,0,0,.30); color: #fff; font-size: 14px; font-weight: 700; }
  .unitwrap { display: flex; align-items: stretch; }
  .unitwrap input { flex: 1; min-width: 0; border-top-right-radius: 0; border-bottom-right-radius: 0; }
  .unit { display: flex; align-items: center; padding: 0 11px; background: rgba(255,213,74,.10); border: 1px solid #3a4350; border-left: none; border-radius: 0 10px 10px 0; font-size: 13px; font-weight: 800; color: var(--gold); white-space: nowrap; }
  .createbar { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; }
  .createbar input { flex: 1; min-width: 120px; padding: 10px 12px; border-radius: 10px; border: 1px solid #3a4350; background: rgba(0,0,0,.30); color: #fff; font-size: 14px; }
  .gamepick { display: flex; gap: 6px; margin-bottom: 9px; }
  .gamepick .opt { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #3a4350; background: rgba(0,0,0,.22); cursor: pointer; text-align: center; font-weight: 700; transition: .15s; }
  .gamepick .opt .em { font-size: 22px; display: block; margin-bottom: 3px; }
  .gamepick .opt.on { border-color: #d9a441; background: rgba(217,164,65,.16); box-shadow: 0 0 0 2px rgba(217,164,65,.28) inset; }
  .empty { color: #8c8170; font-size: 13px; padding: 10px; text-align: center; }
  .orow { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 9px; font-size: 14px; }
  .orow.me { background: rgba(217,164,65,.12); }
  .oname { flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ostat { font-size: 12px; color: #8c8170; }
  .ostat.playing { color: #ffd97a; } .ostat.seated { color: #7ee0a6; }

  /* 방 공통 셸 */
  #roomView { display: none; width: 100%; max-width: 1180px; }
  body.inroom { padding-top: 12px; padding-bottom: 18px; }
  #roomTopbar { position: relative; text-align: center; margin-bottom: 6px; }
  #leaveBtn { position: fixed; left: 14px; top: 18px; z-index: 12; padding: 9px 15px; }
  #roomTitle { font-size: 16px; font-weight: 700; }
  #roomSub { font-size: 12px; color: var(--gold); font-weight: 700; margin-top: 2px; }
  #status { font-size: 13px; min-height: 18px; color: var(--muted); text-align: center; }
  .btnrow { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .log { font-size: 12px; color: var(--muted); max-height: 120px; overflow-y: auto; line-height: 1.65; }

  /* 채팅 */
  .chatbox { font-size: 13px; color: #dde4ee; width: 100%; height: 160px; overflow-y: auto; overflow-x: hidden; overflow-wrap: anywhere; word-break: break-word; line-height: 1.6; margin-bottom: 9px; }
  .chatbox > div { padding: 1px 0; }
  .chatbox .nick { color: #6fb0ff; font-weight: 700; }
  .chatbar { display: flex; gap: 7px; }
  .chatbar input { flex: 1; min-width: 0; padding: 9px 11px; border-radius: 10px; border: 1px solid #3a4350; background: rgba(0,0,0,.30); color: #fff; font-size: 13px; }
  .chatbar button { padding: 9px 13px; font-size: 13px; }

  /* 닉네임 오버레이 */
  #overlay { position: fixed; inset: 0; background: rgba(8,10,14,.80); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 10; }
  #overlay .box { background: linear-gradient(180deg, rgba(40,47,60,.95), rgba(28,33,44,.95)); border: 1px solid var(--panel-brd); padding: 30px 28px; border-radius: 18px; display: flex; flex-direction: column; gap: 14px; width: 320px; box-shadow: 0 24px 60px rgba(0,0,0,.55); }
  #overlay h2 { margin: 0; font-size: 19px; font-weight: 800; text-align: center; }
  #overlay input { padding: 12px 14px; border-radius: 11px; border: 1px solid #3a4350; background: rgba(0,0,0,.30); color: #fff; font-size: 15px; text-align: center; }

  /* ===== 오셀로 (클래식 우드보드 · 틸 패널) ===== */
  body.game-othello #roomMain { max-width: 464px; width: 100%; display: flex; flex-direction: column; gap: 11px; align-items: stretch; }
  body.game-othello .layout { flex-wrap: wrap; }
  @keyframes pulse { 50% { opacity: .55; } }
  @keyframes breathe { 50% { transform: scale(1.18); opacity: .55; } }
  @keyframes place { from { transform: scale(0); } to { transform: scale(1); } }
  /* 플레이어 패널(틸) */
  .opanel { position: relative; display: flex; align-items: center; gap: 13px; padding: 14px 16px 11px; border-radius: 13px; background: linear-gradient(180deg,#317063,#1d4f46); border: 2px solid #9a7d3a; box-shadow: 0 8px 22px rgba(0,0,0,.4); }
  .opanel.turn { border-color: #f6df84; box-shadow: 0 0 0 1px #f6df84, 0 0 20px rgba(246,223,132,.4), 0 8px 22px rgba(0,0,0,.4); }
  .olevel { position: absolute; left: 14px; right: 14px; top: 6px; height: 4px; border-radius: 99px; background: rgba(0,0,0,.32); overflow: hidden; }
  .olevelfill { height: 100%; background: linear-gradient(90deg,#e8c558,#f6df84); border-radius: 99px; transition: width 1s linear; }
  .oavatar { width: 48px; height: 48px; border-radius: 50%; flex: none; margin-top: 3px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: rgba(0,0,0,.25); border: 2px solid #ecc659; box-shadow: 0 2px 6px rgba(0,0,0,.4); }
  .oinfo { flex: 1; min-width: 0; margin-top: 3px; }
  .oname { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .osym { font-size: 11px; font-weight: 600; } .osym.black { color: #cfd8e0; } .osym.white { color: #9fd0c0; }
  .ostatus { font-size: 11px; color: #8fc1b1; margin-top: 1px; white-space: nowrap; }
  .osecs { font-weight: 800; color: #f6df84; font-family: 'Space Grotesk', sans-serif; }
  .oscore { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
  .oscorenum { font-size: 32px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; color: #fff; min-width: 36px; text-align: right; }
  .disc-mini { width: 21px; height: 21px; border-radius: 50%; flex: none; box-shadow: 0 1px 3px rgba(0,0,0,.5); }
  .disc-mini.black { background: radial-gradient(circle at 36% 30%, #7a7a7a, #262626 50%, #000 88%); }
  .disc-mini.white { background: radial-gradient(circle at 36% 30%, #fff, #ededed 45%, #c2c2c2 85%); }
  /* 결과 배너 */
  #oResult { text-align: center; }
  .opill { display: inline-block; padding: 9px 24px; border-radius: 999px; font-size: 16px; font-weight: 800; font-family: 'Space Grotesk', sans-serif; color: #3a2a10; background: linear-gradient(180deg,#f1d36a,#d9b042); box-shadow: 0 6px 18px rgba(0,0,0,.35); }
  /* 나무 프레임 보드 */
  #oBoardWrap { position: relative; align-self: center; }
  #oFrame { position: relative; padding: 18px; border-radius: 16px; background: linear-gradient(158deg,#d8b96d 0%,#c4a155 45%,#ab8842 100%); box-shadow: 0 20px 44px rgba(0,0,0,.5), inset 0 2px 5px rgba(255,255,255,.4), inset 0 -4px 8px rgba(0,0,0,.28); }
  .ocorner { position: absolute; width: 15px; height: 15px; border-radius: 5px; background: #26544c; }
  .ocorner.tl { top: 7px; left: 7px; } .ocorner.tr { top: 7px; right: 7px; } .ocorner.bl { bottom: 7px; left: 7px; } .ocorner.br { bottom: 7px; right: 7px; }
  #board { display: grid; grid-template-columns: repeat(8, 52px); grid-template-rows: repeat(8, 52px); gap: 1px; padding: 2px; border-radius: 4px; background: #5a7730; box-shadow: inset 0 0 0 2px #46602a; }
  .ocell { background: linear-gradient(150deg,#90ad50,#82a046); display: flex; align-items: center; justify-content: center; position: relative; }
  .ocell.playable { cursor: pointer; }
  .ocell.playable::after { content: ""; width: 36%; height: 36%; border-radius: 50%; border: 3px solid rgba(255,255,255,.92); box-sizing: border-box; box-shadow: 0 0 7px rgba(255,255,255,.45); animation: breathe 1.8s ease-in-out infinite; }
  .ocell.hint::after { content: ""; width: 26%; height: 26%; border-radius: 50%; background: rgba(40,30,10,.3); box-shadow: inset 0 0 0 1px rgba(255,255,255,.22); }
  .ocell.last { box-shadow: inset 0 0 0 2px rgba(255,221,120,.9); }
  .disc { width: 80%; height: 80%; border-radius: 50%; box-shadow: 0 3px 5px rgba(0,0,0,.45), inset 0 1px 1px rgba(255,255,255,.25); transition: background .32s ease; }
  .disc.black { background: radial-gradient(circle at 36% 30%, #9a9a9a 0%, #383838 42%, #050505 88%); }
  .disc.white { background: radial-gradient(circle at 36% 30%, #ffffff 0%, #ededed 42%, #c2c2c2 88%); }
  .disc.place { animation: place .26s cubic-bezier(.34,1.56,.64,1) both; }
  /* 둘 곳 없음 — 판 가운데 나무판 토스트 */
  #oToast { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%) scale(.8); opacity: 0; pointer-events: none; z-index: 20; padding: 12px 22px; border-radius: 10px; font-weight: 800; font-size: 16px; color: #f4e6c5; white-space: nowrap; background: linear-gradient(180deg,#6e4f2a,#4a3318); border: 2px solid #2a1c0c; box-shadow: 0 10px 30px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.18); transition: opacity .2s, transform .2s; }
  #oToast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  #oCtrl { display: flex; gap: 8px; justify-content: center; margin-top: 2px; }
  #oCtrl .ostart { background: linear-gradient(180deg,#f1d36a,#d9b042); color: #3a2a10; }
  /* 나무 말풍선 */
  .obubble { position: absolute; left: 60px; top: -6px; transform: translateY(-100%); z-index: 30; max-width: 240px; background: linear-gradient(180deg,#e8d3a0,#cdb074); color: #3a2a10; font-size: 14px; font-weight: 700; padding: 9px 14px; border-radius: 14px 14px 14px 4px; border: 2px solid #8a6a30; box-shadow: 0 8px 22px rgba(0,0,0,.35); animation: bubblein .2s cubic-bezier(.34,1.56,.64,1) both; word-break: break-word; }
  .obubble.out { animation: fadeout .35s ease forwards; }
  .qrow { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 9px; font-size: 14px; }
  .qrow.me { background: rgba(78,161,255,.12); }
  .qrow.play { background: rgba(255,255,255,.05); }
  .qnum { width: 22px; text-align: center; color: var(--muted); font-weight: 700; }
  .qname { flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tag { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; background: #3a4450; color: #c4d0de; }
  .tag.b { background: #15171b; color: #e0e0e0; } .tag.w { background: #eef0f2; color: #1a1d22; }
  .tag.host { background: linear-gradient(180deg, #6a5420, #4a3a17); color: #ffd97a; }

  /* ===== 섯다 ===== */
  /* 고정 크기로 디자인 → JS가 화면에 맞춰 통째로 scale → 어떤 기기서든 동일 비율, 겹침 0 */
  #seotdaStage { width: 720px; max-width: 100%; display: flex; justify-content: center; align-items: flex-start; overflow: hidden; }
  /* 자개(나전) 광택 프레임 — shimmer 애니메이션 */
  #seotdaFelt { position: relative; flex: 0 0 720px; width: 720px; transform-origin: top center; will-change: transform; padding: 13px; border-radius: 32px; background: linear-gradient(115deg,#0f2d3c,#3a1a4a,#0e3a2c,#4a3a12,#3a1240,#0f2d3c); background-size: 300% 100%; animation: shimmer 9s linear infinite; box-shadow: 0 30px 70px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.14); }
  @keyframes shimmer { to { background-position: 300% 50%; } }
  /* 옥색 펠트 */
  #seotdaInner { position: relative; border-radius: 24px; padding: 22px 20px 20px; background: radial-gradient(135% 120% at 50% -8%, #2a9a5c 0%, #16693d 45%, #0c3a22 78%); box-shadow: inset 0 0 90px rgba(0,0,0,.5); }
  /* 먹 코너 문양 */
  .inkmotif { position: absolute; font-size: 30px; font-family: 'Nanum Myeongjo', serif; color: rgba(255,255,255,.13); pointer-events: none; z-index: 0; }
  .inkmotif.tl { top: 16px; left: 20px; }
  .inkmotif.br { bottom: 16px; right: 22px; }
  /* 원형 테이블 + 중앙 판돈 (고정 높이) */
  #seotdaTable { position: relative; width: 100%; height: 540px; margin: 12px auto 14px; }
  #potCenter { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; pointer-events: none; }
  #potCtrl { pointer-events: auto; margin-top: 8px; }
  #potCtrl button { padding: 10px 18px; font-size: 14px; }
  .potpile { position: relative; height: 56px; width: 100px; margin: 0 auto 2px; }
  /* 원화 다발 (만원=초록, 오만원=황금) — 결·초상하이라이트·띠지(세로액면)·3D두께. 더미+날아가는돈 공용 */
  .wbill { position: absolute; width: 50px; height: 32px; border-radius: 3px; overflow: hidden; border: 1px solid rgba(0,0,0,.4); }
  .wbill.man { background: linear-gradient(160deg,#d2e7d6,#9bc6a9 55%,#79a98c); box-shadow: 0 1px 0 rgba(0,0,0,.22), 0 2px 0 #7fae93, 0 3px 0 rgba(0,0,0,.2), 0 4px 0 #7fae93, 0 5px 7px rgba(0,0,0,.5); }
  .wbill.oman { background: linear-gradient(160deg,#f7ead0,#ecd596 55%,#d9bc62); box-shadow: 0 1px 0 rgba(0,0,0,.22), 0 2px 0 #e2c878, 0 3px 0 rgba(0,0,0,.2), 0 4px 0 #e2c878, 0 5px 7px rgba(0,0,0,.5); }
  .wbill::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(180deg, rgba(0,0,0,.13) 0 1px, rgba(255,255,255,.1) 1px 2px, transparent 2px 4px); }
  .wbill::after { content: ''; position: absolute; left: 3px; top: 50%; transform: translateY(-50%); width: 11px; height: 16px; border-radius: 50%; background: radial-gradient(circle at 40% 35%, rgba(255,255,255,.5), rgba(255,255,255,0)); }
  .wbill .strap { position: absolute; top: -1px; bottom: -1px; left: 50%; width: 14px; transform: translateX(-50%); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 .5px rgba(0,0,0,.18); }
  .wbill.man .strap { background: linear-gradient(90deg,#c0cfc6,#eef4f0 28%,#eef4f0 72%,#c0cfc6); }
  .wbill.oman .strap { background: linear-gradient(90deg,#e4d4a0,#fff7e2 28%,#fff7e2 72%,#e4d4a0); }
  .wbill .strap i { writing-mode: vertical-rl; font-style: normal; font-size: 6px; font-weight: 900; letter-spacing: .5px; font-family: 'Space Grotesk', sans-serif; }

          <h3>방 목록</h3>
          <div id="roomList"></div>
          <h3 style="margin-top:16px">새 방 만들기 — 게임 선택</h3>
          <div class="gamepick" id="gamePick"></div>
          <div id="seotdaOpts" style="display:none">
            <div class="optrow">
              <label class="optfield">시작 칩 <span class="unitwrap"><input id="optStart" type="number" min="1" max="100" step="1" value="1" /><span class="unit">억</span></span></label>
              <label class="optfield">점당 <span class="unitwrap"><input id="optAnte" type="number" min="1" max="100" step="1" value="1" /><span class="unit">천만원</span></span></label>
            </div>
            <div id="optHint" class="opthint">시작 칩 1~100억 · 점당 1~100천만 · 시작 칩 ≥ 점당×4</div>
          </div>
          <div class="createbar">
            <input id="roomName" maxlength="24" placeholder="방 이름 (예: 한판하실분)" autocomplete="off" />
            <button id="createBtn">방 만들기</button>
          </div>
        </div>
      </div>
      <div class="col">
        <div class="panel" style="width:300px">
          <h3>로비 채팅</h3>
          <div class="chatbox" id="lobbyChat"></div>
          <div class="chatbar">
            <input id="lobbyChatInput" maxlength="200" placeholder="메시지 입력…" autocomplete="off" />
            <button id="lobbyChatSend">전송</button>
          </div>
        </div>
        <div class="panel" style="width:300px">
          <h3>접속자 <span id="onlineCount"></span></h3>
          <div id="onlineList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 방(게임 공통 셸) -->
  <div id="roomView">
    <div id="roomTopbar">
      <button id="leaveBtn" class="sub">← 나가기</button>
      <div id="roomTitle"></div>
      <div id="roomSub"></div>
    </div>
    <div class="layout">
      <div class="col" id="roomMain"><!-- 게임별 렌더 --></div>
      <div class="col">
        <div class="panel" id="roomInfo" style="width:280px"><!-- 게임별 참가자/대기열 --></div>
        <div class="panel" style="width:280px"><h3>알림</h3><div class="log" id="roomLog"></div></div>
        <div class="panel" style="width:280px">
          <h3>채팅 기록</h3>
          <div class="chatbox" id="roomChat"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="overlay">
    <div class="box">
      <h2>닉네임 입력</h2>
      <input id="nick" maxlength="16" placeholder="닉네임" autocomplete="off" />
      <div id="joinError" style="color:#ff6b6b;font-size:13px;text-align:center;display:none"></div>
      <button id="joinBtn">입장하기</button>
    </div>
  </div>

  <script src="othello.js"></script>
  <script src="seotda.js"></script>
  <script src="app.js"></script>
</body>
</html>
