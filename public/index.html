<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎮 playground</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/common.css" />
<link rel="stylesheet" href="css/othello.css" />
<link rel="stylesheet" href="css/seotda.css" />
<link rel="stylesheet" href="css/poker.css" />
</head>
<body>
  <h1>play<span class="gr">ground</span> <small>오셀로 · 섯다</small></h1>
  <div id="userbar">
    <span id="meLabel" style="font-weight:700"></span>
    <button id="logoutBtn" class="sub" style="padding:5px 10px; font-size:12px">로그아웃</button>
  </div>

  <!-- 로비 -->
  <div id="lobbyView">
    <div class="layout">
      <div class="col">
        <div class="panel" style="min-width:360px">
          <h3>방 목록</h3>
          <div id="roomList"></div>
          <h3 style="margin-top:16px">새 방 만들기 — 게임 선택</h3>
          <div class="gamepick" id="gamePick"></div>
          <!-- 모드: 멀티(기본) / 봇전 -->
          <div class="modepick" id="modePick">
            <button type="button" class="modebtn on" data-mode="multi"><span class="mem">👥</span>멀티<small>친구랑 같이</small></button>
            <button type="button" class="modebtn" data-mode="single"><span class="mem">🤖</span>봇전<small>나 vs 봇</small></button>
          </div>
          <!-- 봇 난이도 (봇전일 때만) -->
          <div class="levelpick" id="levelPick" style="display:none">
            <span class="lvlabel">봇 난이도</span>
            <div class="lvbtns">
              <button type="button" class="levelbtn" data-level="easy">🙂 쉬움</button>
              <button type="button" class="levelbtn on" data-level="normal">😎 보통</button>
              <button type="button" class="levelbtn" data-level="hard">🔥 어려움</button>
              <button type="button" class="levelbtn" data-level="hell">💀 헬</button>
            </div>
          </div>
          <!-- 방 생성 옵션: 선택한 게임 렌더러의 meta.options로 app.js가 동적 생성 -->
          <div id="seotdaOpts" style="display:none"></div>
          <div class="createbar">
            <input id="roomName" maxlength="24" placeholder="방 이름 (예: 한판하실분)" autocomplete="off" />
            <button id="createBtn">방 만들기</button>
          </div>
        </div>
      </div>
      <div class="col">
        <div class="panel" style="width:300px">
          <h3>로비 채팅</h3>
          <div class="chatbox" id="lobbyChat"></div>
          <div class="chatbar">
            <input id="lobbyChatInput" maxlength="200" placeholder="메시지 입력…" autocomplete="off" />
            <button id="lobbyChatSend">전송</button>
          </div>
        </div>
        <div class="panel" style="width:300px">
          <h3>접속자 <span id="onlineCount"></span></h3>
          <div id="onlineList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 방(게임 공통 셸) -->
  <div id="roomView">
    <div id="roomTopbar">
      <button id="leaveBtn" class="sub">← 나가기</button>
      <div id="roomTitle"></div>
      <div id="roomSub"></div>
    </div>
    <div class="layout">
      <div class="col" id="roomMain"><!-- 게임별 렌더 --></div>
      <div class="col">
        <div class="panel" id="roomInfo" style="width:280px"><!-- 게임별 참가자/대기열 --></div>
        <div class="panel" style="width:280px"><h3>알림</h3><div class="log" id="roomLog"></div></div>
        <div class="panel" style="width:280px">
          <h3>채팅 기록</h3>
          <div class="chatbox" id="roomChat"></div>
          <div class="chatbar" id="roomChatBar">
            <input id="roomChatInput" maxlength="200" placeholder="메시지 입력…" autocomplete="off" />
            <button id="roomChatSend">전송</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="overlay">
    <div class="box">
      <h2>닉네임 입력</h2>
      <input id="nick" maxlength="16" placeholder="닉네임" autocomplete="off" />
      <div id="joinError" style="color:#ff6b6b;font-size:13px;text-align:center;display:none"></div>
      <button id="joinBtn">입장하기</button>
    </div>
  </div>

  <script src="othello.js"></script>
  <script src="seotda.js"></script>
  <script src="poker.js"></script>
  <script src="app.js"></script>
</body>
</html>
