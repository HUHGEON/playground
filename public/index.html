<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎮 playground · 오셀로 · 섯다</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --cell: min(10vw, 56px);
    --bg: #0e1116; --panel: rgba(34,40,52,.72); --panel-brd: rgba(255,255,255,.07);
    --txt: #e9edf4; --muted: #8b9bb0; --accent: #4ea1ff; --green: #2ea05a; --gold: #ffd54a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; gap: 14px; padding: 20px 12px 48px;
    font-family: "Pretendard", system-ui, -apple-system, "Apple SD Gothic Neo", sans-serif;
    color: var(--txt); -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(1100px 600px at 50% -10%, #1c2740 0%, transparent 60%),
      radial-gradient(900px 500px at 90% 110%, #1a3326 0%, transparent 55%),
      var(--bg);
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 99px; }
  ::-webkit-scrollbar-track { background: transparent; }

  h1 {
    margin: 2px 0; font-size: 25px; font-weight: 800; letter-spacing: 2px;
    background: linear-gradient(90deg, #eaf2ff, #9ec9ff 55%, #6fe0a8);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  h3 { margin: 0 0 12px; font-size: 13px; color: var(--muted); font-weight: 700; letter-spacing: .3px; text-transform: uppercase; }
  .layout { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .panel { background: var(--panel); border: 1px solid var(--panel-brd); border-radius: 16px; padding: 16px 18px; min-width: 240px; backdrop-filter: blur(8px); box-shadow: 0 12px 30px rgba(0,0,0,.30); }
  button { background: linear-gradient(180deg, #37b366, #2a8f50); color: #fff; border: none; padding: 10px 18px; border-radius: 11px; cursor: pointer; font-size: 14px; font-weight: 700; box-shadow: 0 4px 12px rgba(28,140,72,.30); transition: transform .08s, filter .15s, box-shadow .15s; }
  button:hover { filter: brightness(1.08); transform: translateY(-1px); }
  button:active { transform: translateY(0); filter: brightness(.96); }
  button:disabled { background: #2a313c; color: #6f8198; cursor: not-allowed; box-shadow: none; transform: none; filter: none; }
  button.sub { background: linear-gradient(180deg, #46505e, #38414b); box-shadow: 0 4px 12px rgba(0,0,0,.25); }
  button.danger { background: linear-gradient(180deg, #c0492f, #9a3b2f); box-shadow: 0 4px 12px rgba(160,60,40,.30); }
  button.gold { background: linear-gradient(180deg, #e8b13a, #c98e1c); color: #2a1c00; box-shadow: 0 4px 12px rgba(200,150,20,.35); }

  #userbar { background: var(--panel); border: 1px solid var(--panel-brd); padding: 7px 8px 7px 16px; border-radius: 999px; display: none; align-items: center; gap: 10px; }
  input { font-family: inherit; }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(78,161,255,.20); }

  /* 로비 */
  #lobbyView { display: none; }
  .roomrow { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1px solid var(--panel-brd); margin-bottom: 9px; transition: background .15s, border-color .15s; }
  .roomrow:hover { background: rgba(255,255,255,.07); border-color: rgba(78,161,255,.35); }
  .roomrow .gicon { font-size: 20px; width: 26px; text-align: center; }
  .roomrow .rname { flex: 1; font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .roomrow .meta { font-size: 12px; color: var(--muted); }
  .roomrow button { padding: 7px 14px; font-size: 13px; }
  .gtag { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; background: #2f3a4a; color: #bcd; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: #3a4450; color: #c4d0de; }
  .badge.play { background: linear-gradient(180deg, #6a5420, #4a3a17); color: #ffd97a; }
  #seotdaOpts { display: flex; flex-direction: column; gap: 6px; margin-top: 9px; }
  .optrow { display: flex; gap: 10px; }
  .opthint { font-size: 11px; color: var(--muted); }
  .opthint.err { color: #ff8a7a; font-weight: 700; }
  .optfield { flex: 1; font-size: 12px; color: var(--muted); font-weight: 600; display: flex; flex-direction: column; gap: 4px; }
  .optfield input { padding: 9px 11px; border-radius: 10px; border: 1px solid #3a4350; background: rgba(0,0,0,.30); color: #fff; font-size: 14px; font-weight: 700; }
  .unitwrap { display: flex; align-items: stretch; }
  .unitwrap input { flex: 1; min-width: 0; border-top-right-radius: 0; border-bottom-right-radius: 0; }
  .unit { display: flex; align-items: center; padding: 0 11px; background: rgba(255,213,74,.10); border: 1px solid #3a4350; border-left: none; border-radius: 0 10px 10px 0; font-size: 13px; font-weight: 800; color: var(--gold); white-space: nowrap; }
  .createbar { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; }
  .createbar input { flex: 1; min-width: 120px; padding: 10px 12px; border-radius: 10px; border: 1px solid #3a4350; background: rgba(0,0,0,.30); color: #fff; font-size: 14px; }
  .gamepick { display: flex; gap: 6px; margin-bottom: 9px; }
  .gamepick .opt { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #3a4350; background: rgba(0,0,0,.22); cursor: pointer; text-align: center; font-weight: 700; transition: .15s; }
  .gamepick .opt .em { font-size: 22px; display: block; margin-bottom: 3px; }
  .gamepick .opt.on { border-color: var(--accent); background: rgba(78,161,255,.16); box-shadow: 0 0 0 2px rgba(78,161,255,.25) inset; }
  .empty { color: var(--muted); font-size: 13px; padding: 10px; text-align: center; }
  .orow { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 9px; font-size: 14px; }
  .orow.me { background: rgba(78,161,255,.12); }
  .oname { flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ostat { font-size: 12px; color: var(--muted); }
  .ostat.playing { color: #ffd97a; } .ostat.seated { color: #7ee0a6; }

  /* 방 공통 셸 */
  #roomView { display: none; width: 100%; max-width: 1180px; }
  body.inroom { padding-top: 12px; padding-bottom: 18px; }
  #roomTopbar { position: relative; text-align: center; margin-bottom: 6px; }
  #leaveBtn { position: fixed; left: 14px; top: 18px; z-index: 12; padding: 9px 15px; }
  #roomTitle { font-size: 16px; font-weight: 700; }
  #roomSub { font-size: 12px; color: var(--gold); font-weight: 700; margin-top: 2px; }
  #status { font-size: 13px; min-height: 18px; color: var(--muted); text-align: center; }
  .btnrow { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .log { font-size: 12px; color: var(--muted); max-height: 120px; overflow-y: auto; line-height: 1.65; }

  /* 채팅 */
  .chatbox { font-size: 13px; color: #dde4ee; width: 100%; height: 160px; overflow-y: auto; overflow-x: hidden; overflow-wrap: anywhere; word-break: break-word; line-height: 1.6; margin-bottom: 9px; }
  .chatbox > div { padding: 1px 0; }
  .chatbox .nick { color: #6fb0ff; font-weight: 700; }
  .chatbar { display: flex; gap: 7px; }
  .chatbar input { flex: 1; min-width: 0; padding: 9px 11px; border-radius: 10px; border: 1px solid #3a4350; background: rgba(0,0,0,.30); color: #fff; font-size: 13px; }
  .chatbar button { padding: 9px 13px; font-size: 13px; }

  /* 닉네임 오버레이 */
  #overlay { position: fixed; inset: 0; background: rgba(8,10,14,.80); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 10; }
  #overlay .box { background: linear-gradient(180deg, rgba(40,47,60,.95), rgba(28,33,44,.95)); border: 1px solid var(--panel-brd); padding: 30px 28px; border-radius: 18px; display: flex; flex-direction: column; gap: 14px; width: 320px; box-shadow: 0 24px 60px rgba(0,0,0,.55); }
  #overlay h2 { margin: 0; font-size: 19px; font-weight: 800; text-align: center; }
  #overlay input { padding: 12px 14px; border-radius: 11px; border: 1px solid #3a4350; background: rgba(0,0,0,.30); color: #fff; font-size: 15px; text-align: center; }

  /* ===== 오셀로 ===== */
  #turnbar { font-size: 18px; font-weight: 800; padding: 12px 22px; border-radius: 14px; text-align: center; min-width: 300px; background: var(--panel); border: 1px solid var(--panel-brd); color: var(--muted); transition: .2s; }
  #turnbar.you { background: linear-gradient(180deg, #2aa55c, #1f8048); color: #fff; border-color: transparent; box-shadow: 0 0 0 3px rgba(56,196,106,.30); }
  #turnbar.them { background: linear-gradient(180deg, #4a3a1f, #3a2f1f); color: #f0c987; border-color: transparent; }
  #turnbar.over { background: linear-gradient(180deg, #34405a, #2a3346); color: #dbe6f5; border-color: transparent; }
  #timer { font-size: 22px; font-weight: 800; min-height: 26px; color: #dbe6f5; font-variant-numeric: tabular-nums; }
  #timer.low { color: #ff6b6b; animation: pulse .9s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .55; } }
  #scores { display: flex; gap: 16px; font-size: 15px; align-items: center; }
  .chip { display: flex; align-items: center; gap: 8px; padding: 7px 14px; border-radius: 999px; background: var(--panel); border: 1px solid var(--panel-brd); max-width: 190px; font-weight: 600; transition: .2s; }
  .chip.active { box-shadow: 0 0 0 2px var(--accent); }
  .chip .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .disc-mini { width: 16px; height: 16px; border-radius: 50%; flex: none; box-shadow: 0 1px 2px rgba(0,0,0,.5); }
  .disc-mini.black { background: radial-gradient(circle at 34% 28%, #6d6d6d, #111); }
  .disc-mini.white { background: radial-gradient(circle at 34% 28%, #fff, #cfcfcf); }
  #board { display: grid; grid-template-columns: repeat(8, var(--cell)); grid-template-rows: repeat(8, var(--cell)); background: #0a3a24; padding: 13px; border-radius: 14px; gap: 2px; box-shadow: inset 0 0 0 2px rgba(0,0,0,.35), 0 0 0 5px #0c3320, 0 26px 55px rgba(0,0,0,.55); }
  .ocell { background: linear-gradient(150deg, #1c7547, #136039); display: flex; align-items: center; justify-content: center; position: relative; border-radius: 2px; }
  .ocell.playable { cursor: pointer; }
  .ocell.playable::after { content: ""; width: 32%; height: 32%; border-radius: 50%; background: radial-gradient(circle, rgba(140,245,170,.9), rgba(110,220,150,.5)); box-shadow: 0 0 10px rgba(120,235,160,.6); animation: breathe 1.6s ease-in-out infinite; }
  @keyframes breathe { 50% { transform: scale(1.18); opacity: .75; } }
  .ocell.hint::after { content: ""; width: 24%; height: 24%; border-radius: 50%; background: rgba(255,255,255,.20); }
  .disc { width: 82%; height: 82%; border-radius: 50%; box-shadow: 0 3px 5px rgba(0,0,0,.45); }
  .disc.black { background: radial-gradient(circle at 34% 28%, #6d6d6d, #1a1a1a 58%, #000); }
  .disc.white { background: radial-gradient(circle at 34% 28%, #ffffff, #dadada 55%, #b6b6b6); }
  .disc.place { animation: place .26s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes place { from { transform: scale(0); } to { transform: scale(1); } }
  .qrow { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 9px; font-size: 14px; }
  .qrow.me { background: rgba(78,161,255,.12); }
  .qrow.play { background: rgba(255,255,255,.05); }
  .qnum { width: 22px; text-align: center; color: var(--muted); font-weight: 700; }
  .qname { flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tag { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; background: #3a4450; color: #c4d0de; }
  .tag.b { background: #15171b; color: #e0e0e0; } .tag.w { background: #eef0f2; color: #1a1d22; }
  .tag.host { background: linear-gradient(180deg, #6a5420, #4a3a17); color: #ffd97a; }

  /* ===== 섯다 ===== */
  /* 고정 크기로 디자인 → JS가 화면에 맞춰 통째로 scale → 어떤 기기서든 동일 비율, 겹침 0 */
  #seotdaStage { width: 720px; max-width: 100%; display: flex; justify-content: center; align-items: flex-start; overflow: hidden; }
  #seotdaFelt { position: relative; flex: 0 0 720px; width: 720px; transform-origin: top center; will-change: transform; background: radial-gradient(135% 120% at 50% -8%, #2a9a5c 0%, #16693d 45%, #0c3a22 78%); border: 7px solid; border-image: linear-gradient(160deg, #5a4022, #2f2010) 1; border-radius: 26px; padding: 22px 18px 24px; box-shadow: inset 0 0 0 2px rgba(0,0,0,.35), inset 0 0 90px rgba(0,0,0,.5), 0 22px 55px rgba(0,0,0,.6); }
  #seotdaFelt::before { content: ''; position: absolute; inset: 6px; border-radius: 20px; box-shadow: inset 0 0 0 1px rgba(255,255,255,.07); pointer-events: none; }
  /* 원형 테이블 + 중앙 판돈 (고정 높이) */
  #seotdaTable { position: relative; width: 100%; height: 540px; margin: 12px auto 14px; }
  #potCenter { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; pointer-events: none; }
  #potCtrl { pointer-events: auto; margin-top: 8px; }
  #potCtrl button { padding: 10px 18px; font-size: 14px; }
  .potpile { position: relative; height: 56px; width: 100px; margin: 0 auto 2px; }
  /* 원화 다발 (만원=청록, 오만원=금색) — 두께 + 종이띠. 더미 + 날아가는 돈 공용 */
  .wbill { position: absolute; width: 44px; height: 28px; border-radius: 2px; border: 1px solid rgba(0,0,0,.42); background: linear-gradient(180deg, var(--b1), var(--b2)); box-shadow: 0 1px 0 rgba(0,0,0,.22), 0 2px 0 var(--b2), 0 3px 0 rgba(0,0,0,.2), 0 4px 0 var(--b2), 0 5px 7px rgba(0,0,0,.5); }
  .wbill.man { --b1: #c4e8d4; --b2: #71bda1; }
  .wbill.oman { --b1: #f8e4a8; --b2: #e2bf64; }
  .wbill::after { content: ''; position: absolute; left: 50%; top: -1px; bottom: -1px; width: 11px; transform: translateX(-50%); background: linear-gradient(90deg, rgba(255,255,255,.6), #fdfbf2 45%, #fff 55%, rgba(255,255,255,.6)); box-shadow: inset 0 0 0 1px rgba(0,0,0,.12); }
  .wbill .den { position: absolute; top: 1px; left: 3px; font-size: 7px; font-weight: 900; font-style: normal; color: rgba(18,46,32,.9); z-index: 1; }
  .wbill.oman .den { color: rgba(74,50,5,.9); }
  .potamt { font-size: 25px; font-weight: 900; color: var(--gold); text-shadow: 0 2px 8px #000; margin-top: 8px; font-variant-numeric: tabular-nums; }
  .potsub { font-size: 11px; color: #cdeede; margin-top: 2px; }
  .pottimer { font-size: 15px; font-weight: 800; color: #fff; margin-top: 3px; }

  #seotdaTable .seat { position: absolute; transform: translate(-50%,-50%); width: 142px; padding: 7px 8px 8px; text-align: center; background: linear-gradient(180deg, rgba(22,32,28,.84), rgba(8,16,12,.88)); border: 1px solid rgba(255,255,255,.12); border-radius: 14px; box-shadow: 0 5px 16px rgba(0,0,0,.5); transition: box-shadow .18s, border-color .18s; }
  #seotdaTable .seat.me { z-index: 3; border-color: rgba(110,224,166,.6); background: linear-gradient(180deg, rgba(30,72,52,.88), rgba(10,30,20,.92)); }
  .seat.turn { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold), 0 0 18px rgba(255,213,74,.5); animation: seatpulse 1s ease-in-out infinite; z-index: 4; }
  @keyframes seatpulse { 50% { box-shadow: 0 0 0 3px var(--gold), 0 0 30px rgba(255,213,74,.8); } }
  .seat.folded { opacity: .42; filter: grayscale(.6); }
  .seat.win { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold), 0 0 26px rgba(255,213,74,.65); z-index: 4; }
  #seotdaTable .seat.waiting { opacity: .6; border-style: dashed; background: linear-gradient(180deg, rgba(30,40,36,.55), rgba(10,18,14,.6)); }
  .seat.waiting .cards { display: flex; align-items: center; justify-content: center; }
  .emptycard { font-size: 30px; opacity: .5; }
  .stag.wait { background: #3a4450; color: #cdd6e0; }
  #seotdaTable .seat.bust { border-color: rgba(192,73,47,.5); background: linear-gradient(180deg, rgba(45,28,26,.6), rgba(20,12,11,.65)); }
  .stag.bust { background: #7a1f1f; color: #ffd0d0; }
  .seat .cards { display: flex; gap: 7px; justify-content: center; align-items: flex-end; min-height: 90px; }
  .seat .betrow { min-height: 17px; margin: 4px 0 2px; }
  .seat .betc { font-size: 11px; color: #cfe; font-weight: 700; margin-left: 4px; }
  .seat .namebar { display: flex; align-items: center; justify-content: center; gap: 5px; }
  .seat .nm { font-weight: 800; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 96px; }
  .seat .ch { font-size: 12px; color: var(--gold); font-weight: 800; font-variant-numeric: tabular-nums; margin-top: 1px; }
  .seat .hd { font-size: 12px; font-weight: 800; color: var(--gold); min-height: 15px; margin-top: 2px; }
  .stag { font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 999px; }
  .stag.allin { background: #7a1f1f; color: #ffd0d0; } .stag.die { background: #333; color: #aaa; }
  .stag.host { background: linear-gradient(180deg, #6a5420, #4a3a17); color: #ffd97a; }

  /* 화투패 */
  .hwatu { width: 60px; height: 90px; border-radius: 9px; position: relative; overflow: hidden; background: #f6efde; border: 2px solid #20242b; box-shadow: 0 4px 9px rgba(0,0,0,.45); display: flex; flex-direction: column; flex: none; }
  .hwatu .band { height: 48%; background: var(--hb, #2a6); position: relative; display: flex; align-items: center; justify-content: center; }
  .hwatu .band .art { font-size: 27px; filter: drop-shadow(0 1px 1px rgba(0,0,0,.45)); }
  .hwatu .lower { flex: 1; display: flex; align-items: center; justify-content: center; gap: 3px; background: linear-gradient(180deg,#fbf6ea,#efe6cf); }
  .hwatu .lower .sub { font-size: 19px; }
  .hwatu .mon { position: absolute; top: 2px; left: 4px; font-size: 11px; font-weight: 900; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.7); z-index: 2; }
  .hwatu .nm { position: absolute; bottom: 3px; width: 100%; text-align: center; font-size: 11px; font-weight: 800; color: #3a2a18; letter-spacing: 1px; }
  .hwatu .gwang { position: absolute; top: 3px; right: 3px; width: 19px; height: 19px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #fff3b0, #e6a800); color: #7a4a00; font-weight: 900; font-size: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 7px rgba(255,200,0,.85); border: 1px solid #b07c00; z-index: 2; }
  .hwatu .ribbon { display: flex; align-items: center; justify-content: center; min-width: 16px; min-height: 30px; padding: 2px 3px; border-radius: 3px; background: var(--rc, #c0392b); color: #fff; font-size: 9px; font-weight: 900; writing-mode: vertical-rl; letter-spacing: 2px; transform: rotate(-8deg); box-shadow: 0 1px 3px rgba(0,0,0,.45); }
  .hwatu.sm .ribbon { min-height: 22px; font-size: 8px; }
  .hwatu.back { background: repeating-linear-gradient(45deg, #93132a, #93132a 7px, #7c1020 7px, #7c1020 14px); border-color: #4a0a14; }
  .hwatu.back::after { content: '花'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 800; color: rgba(255,235,210,.16); }
  .hwatu.img { background: #fff; border: none; padding: 0; box-shadow: 0 4px 9px rgba(0,0,0,.45); }
  .hwatu.img img { width: 100%; height: 100%; object-fit: fill; display: block; border-radius: 7px; }
  .hwatu.win { box-shadow: 0 0 0 3px var(--gold), 0 6px 16px rgba(255,200,0,.55); }
  .hwatu.deal { animation: deal .3s ease both; }
  @keyframes deal { from { transform: translateY(-16px) rotate(-6deg); opacity: 0; } }
  .hwatu.med { width: 50px; height: 75px; border-radius: 8px; }
  .hwatu.sm { width: 44px; height: 66px; border-radius: 7px; }
  .hwatu.sm .band .art { font-size: 20px; } .hwatu.sm .lower .sub { font-size: 14px; }
  .hwatu.sm .mon, .hwatu.sm .nm { font-size: 9px; } .hwatu.sm .gwang { width: 15px; height: 15px; font-size: 10px; }

  #myStatus { text-align: center; margin-top: 8px; }
  #myStatus .ms-line { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  #seotdaActions { display: flex; gap: 11px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
  #seotdaActions button { padding: 13px 20px; font-size: 15px; }
  /* 베팅 종류별 색 (버튼) */
  #seotdaActions .b-check { background: linear-gradient(180deg,#5a6675,#454f5c); }
  #seotdaActions .b-ping  { background: linear-gradient(180deg,#3a7bd5,#2a5ea8); }
  #seotdaActions .b-call  { background: linear-gradient(180deg,#2ea05a,#1f8048); }
  #seotdaActions .b-ddang { background: linear-gradient(180deg,#8b5cf6,#6d3fce); }
  #seotdaActions .b-half  { background: linear-gradient(180deg,#e8853a,#c4671c); }
  #seotdaActions .b-full  { background: linear-gradient(180deg,#11a39a,#0c7d76); }
  #seotdaActions .b-allin { background: linear-gradient(180deg,#e8b13a,#c98e1c); color:#2a1c00; }
  #seotdaActions .b-die   { background: linear-gradient(180deg,#c0492f,#9a3b2f); }
  #seotdaResult { text-align: center; font-size: 15px; font-weight: 800; color: var(--gold); min-height: 0; }
  #seotdaResult:not(:empty) { padding: 7px 16px; margin: 0 auto; max-width: 90%; background: rgba(0,0,0,.42); border: 1px solid rgba(255,213,74,.3); border-radius: 999px; box-shadow: 0 4px 14px rgba(0,0,0,.35); }
  #myhand button { margin-top: 8px; }

  /* 재참가 박스 */
  #buyinBox { margin-top: 10px; }
  #buyinBox:not(:empty) { background: rgba(0,0,0,.28); border: 1px solid rgba(255,213,74,.35); border-radius: 12px; padding: 10px 12px; }
  .buyin-title { font-size: 12px; color: #cfe; margin-bottom: 8px; }
  .buyin-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 4px 0; font-weight: 700; }
  .buyin-row button { padding: 6px 12px; font-size: 13px; }

  /* 내 차례 — 판 중앙 토스트 */
  .turn-toast { position: absolute; z-index: 40;
    background: linear-gradient(180deg,#2fbf6b,#1f8048); color: #fff; font-weight: 900; font-size: 26px; letter-spacing: 1px;
    padding: 18px 44px; border-radius: 18px; box-shadow: 0 16px 50px rgba(0,0,0,.5), 0 0 0 4px rgba(110,224,166,.5), 0 0 40px rgba(56,196,106,.6);
    animation: toastin .25s cubic-bezier(.34,1.56,.64,1) both; pointer-events: none; text-shadow: 0 2px 6px rgba(0,0,0,.4); }
  .turn-toast.out { animation: toastout .34s ease forwards; }
  @keyframes toastin { from { opacity: 0; transform: translate(-50%,-50%) scale(.7); } to { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
  @keyframes toastout { to { opacity: 0; transform: translate(-50%,-50%) scale(1.15); } }

  /* 내 차례 — 판 테두리 번쩍 */
  #seotdaFelt.myturn { animation: feltglow 1s ease-in-out infinite; }
  @keyframes feltglow {
    0%,100% { box-shadow: inset 0 0 0 3px rgba(0,0,0,.3), inset 0 0 80px rgba(0,0,0,.45), 0 0 0 3px rgba(110,224,166,.5), 0 0 28px rgba(56,196,106,.5); }
    50% { box-shadow: inset 0 0 0 3px rgba(0,0,0,.3), inset 0 0 80px rgba(0,0,0,.45), 0 0 0 5px rgba(110,224,166,.95), 0 0 48px rgba(56,196,106,.9); }
  }

  /* 베팅 액션 배지 */
  /* 베팅 배지(좌석 상시) + 좌석 토스트(팝) — 종류별 같은 색 */
  .actbadge { font-size: 10px; font-weight: 900; padding: 1px 7px; border-radius: 999px; color: #fff; }
  .ab-check { background: #5a6675; }
  .ab-ping  { background: #3a7bd5; }
  .ab-call  { background: #2ea05a; }
  .ab-ddang { background: #8b5cf6; }
  .ab-half  { background: #e8853a; }
  .ab-full  { background: #11a39a; }
  .ab-allin { background: #e8b13a; color: #2a1c00; }
  .ab-die   { background: #c0492f; }
  .act-toast { position: absolute; z-index: 38; transform: translate(-50%,-50%); font-weight: 900; font-size: 20px;
    padding: 8px 20px; border-radius: 12px; color: #fff; box-shadow: 0 8px 24px rgba(0,0,0,.5), 0 0 0 3px rgba(255,255,255,.18);
    animation: acttoastin .2s cubic-bezier(.34,1.56,.64,1) both; pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,.45); }
  .act-toast.out { animation: acttoastout .3s ease forwards; }
  @keyframes acttoastin { from { opacity: 0; transform: translate(-50%,-50%) scale(.6); } to { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
  @keyframes acttoastout { to { opacity: 0; transform: translate(-50%,-80%) scale(1.05); } }

  /* 판 밑 채팅 입력 */
  .feltchat { display: flex; gap: 7px; width: min(96vw, 820px); margin: 12px auto 0; }
  .feltchat input { flex: 1; min-width: 0; padding: 11px 14px; border-radius: 12px; border: 1px solid #3a4350; background: rgba(0,0,0,.35); color: #fff; font-size: 14px; }
  .feltchat input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(78,161,255,.2); }
  .feltchat button { padding: 11px 18px; }

  /* 좌석 말풍선 */
  .chat-bubble { position: absolute; transform: translate(-50%,-100%); z-index: 36; max-width: 200px;
    background: linear-gradient(180deg, #f8f1dd, #ece0c2); color: #3a2718; font-size: 13px; font-weight: 700;
    padding: 8px 13px; border-radius: 16px; border: 2px solid #8a1020;
    box-shadow: 0 7px 20px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.5); animation: bubblein .2s cubic-bezier(.34,1.56,.64,1) both; word-break: break-word; pointer-events: none; }
  .chat-bubble::before { content: ''; position: absolute; bottom: -9px; left: 50%; transform: translateX(-50%); border: 9px solid transparent; border-top-color: #8a1020; border-bottom: 0; }
  .chat-bubble::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border: 7px solid transparent; border-top-color: #ece0c2; border-bottom: 0; }
  .chat-bubble.out { animation: bubbleout .35s ease forwards; }

  /* 베팅 시 가운데로 지폐 던지기 */
  .money-fly { position: absolute !important; z-index: 37; transform: translate(-50%,-50%); pointer-events: none; box-shadow: 0 3px 7px rgba(0,0,0,.55); animation: moneyfly .58s cubic-bezier(.45,0,.65,1) both; will-change: transform, opacity; }
  @keyframes moneyfly {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(.5) rotate(-12deg); }
    18% { opacity: 1; }
    100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.85) rotate(18deg); }
  }
  @keyframes bubblein { from { opacity: 0; transform: translate(-50%,-78%) scale(.7); } to { opacity: 1; transform: translate(-50%,-100%) scale(1); } }
  @keyframes bubbleout { to { opacity: 0; transform: translate(-50%,-118%); } }

  /* 섞기/딜링 연출 */
  #shuffleFx { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 5; pointer-events: none; }
  #shuffleFx .deck { position: relative; width: 60px; height: 90px; }
  #shuffleFx .sc { position: absolute; left: 0; top: 0; width: 56px; height: 84px; border-radius: 8px; border: 2px solid #4a0a14; background: repeating-linear-gradient(45deg, #93132a, #93132a 7px, #7c1020 7px, #7c1020 14px); box-shadow: 0 5px 12px rgba(0,0,0,.5); }
  #shuffleFx .sc::after { content: '花'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 26px; color: rgba(255,235,210,.18); }
  #shuffleFx .lbl { position: absolute; bottom: 18%; width: 100%; text-align: center; color: #ffe9a8; font-weight: 800; letter-spacing: 2px; font-size: 14px; text-shadow: 0 2px 6px rgba(0,0,0,.6); }
  @keyframes riffle0 { 0%,100% { transform: translate(0,0) rotate(0); } 25% { transform: translate(-26px,-6px) rotate(-12deg); } 60% { transform: translate(20px,4px) rotate(9deg); } }
  @keyframes riffle1 { 0%,100% { transform: translate(0,0) rotate(0); } 30% { transform: translate(24px,-8px) rotate(11deg); } 65% { transform: translate(-18px,6px) rotate(-8deg); } }
  @keyframes riffle2 { 0%,100% { transform: translate(0,0) rotate(0); } 35% { transform: translate(-18px,8px) rotate(7deg); } 70% { transform: translate(22px,-4px) rotate(-10deg); } }
  #shuffleFx.go .sc:nth-child(1) { animation: riffle0 .42s ease-in-out 2; }
  #shuffleFx.go .sc:nth-child(2) { animation: riffle1 .42s ease-in-out 2; }
  #shuffleFx.go .sc:nth-child(3) { animation: riffle2 .42s ease-in-out 2; }
  #shuffleFx.go .sc:nth-child(4) { animation: riffle0 .42s ease-in-out 2 .06s; }
  #shuffleFx.go .sc:nth-child(5) { animation: riffle1 .42s ease-in-out 2 .03s; }
  #shuffleFx.fade { animation: fadeout .25s ease forwards; }
  @keyframes fadeout { to { opacity: 0; } }

  /* 족보표 (사이드바 상시 표시) */
  /* 족보 — 단일 세로 리스트(위=강함, 상성 명시) */
  #jokboPanel { max-height: 64vh; overflow-y: auto; }
  .jlegend { font-size: 11px; color: var(--gold); font-weight: 700; margin-bottom: 6px; padding: 5px 8px; background: rgba(255,213,74,.1); border-radius: 8px; }
  .jlist { display: flex; flex-direction: column; gap: 3px; }
  .jcat { background: #000; color: #fff; font-weight: 800; font-size: 11px; letter-spacing: 1.5px; padding: 5px 8px; border-radius: 5px; margin: 7px 0 2px; }
  .jrow { display: flex; align-items: center; gap: 9px; padding: 4px 6px; border-radius: 7px; background: rgba(255,255,255,.035); }
  .jrow.hi { background: rgba(255,213,74,.14); }
  .jrow.hi .jn { color: var(--gold); }
  .jrow .jcc { flex: none; display: flex; gap: 2px; }
  .jrow .jcc img { width: 22px; height: 33px; border-radius: 3px; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.4); display: block; }
  .jrow .jt { min-width: 0; }
  .jrow .jn { font-size: 12px; font-weight: 700; color: #eaf0f8; }
  .jrow .jd { font-size: 10px; color: var(--muted); line-height: 1.3; margin-top: 1px; }
  .jrow .jd b { color: var(--gold); }
</style>
</head>
<body>
  <h1>🎮 playground</h1>
  <div id="userbar">
    <span id="meLabel" style="font-weight:700"></span>
    <button id="logoutBtn" class="sub" style="padding:5px 10px; font-size:12px">로그아웃</button>
  </div>

  <!-- 로비 -->
  <div id="lobbyView">
    <div class="layout">
      <div class="col">
        <div class="panel" style="min-width:360px">
          <h3>방 목록</h3>
          <div id="roomList"></div>
          <h3 style="margin-top:16px">새 방 만들기 — 게임 선택</h3>
          <div class="gamepick" id="gamePick"></div>
          <div id="seotdaOpts" style="display:none">
            <div class="optrow">
              <label class="optfield">시작 칩 <span class="unitwrap"><input id="optStart" type="number" min="1" max="100" step="1" value="1" /><span class="unit">억</span></span></label>
              <label class="optfield">점당 <span class="unitwrap"><input id="optAnte" type="number" min="1" max="100" step="1" value="1" /><span class="unit">천만원</span></span></label>
            </div>
            <div id="optHint" class="opthint">시작 칩 1~100억 · 점당 1~100천만 · 시작 칩 ≥ 점당×4</div>
          </div>
          <div class="createbar">
            <input id="roomName" maxlength="24" placeholder="방 이름 (예: 한판하실분)" autocomplete="off" />
            <button id="createBtn">방 만들기</button>
          </div>
        </div>
      </div>
      <div class="col">
        <div class="panel" style="width:300px">
          <h3>로비 채팅</h3>
          <div class="chatbox" id="lobbyChat"></div>
          <div class="chatbar">
            <input id="lobbyChatInput" maxlength="200" placeholder="메시지 입력…" autocomplete="off" />
            <button id="lobbyChatSend">전송</button>
          </div>
        </div>
        <div class="panel" style="width:300px">
          <h3>접속자 <span id="onlineCount"></span></h3>
          <div id="onlineList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 방(게임 공통 셸) -->
  <div id="roomView">
    <div id="roomTopbar">
      <button id="leaveBtn" class="sub">← 나가기</button>
      <div id="roomTitle"></div>
      <div id="roomSub"></div>
    </div>
    <div class="layout">
      <div class="col" id="roomMain"><!-- 게임별 렌더 --></div>
      <div class="col">
        <div class="panel" id="roomInfo" style="width:280px"><!-- 게임별 참가자/대기열 --></div>
        <div class="panel" style="width:280px"><h3>알림</h3><div class="log" id="roomLog"></div></div>
        <div class="panel" style="width:280px">
          <h3>채팅 기록</h3>
          <div class="chatbox" id="roomChat"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="overlay">
    <div class="box">
      <h2>닉네임 입력</h2>
      <input id="nick" maxlength="16" placeholder="닉네임" autocomplete="off" />
      <div id="joinError" style="color:#ff6b6b;font-size:13px;text-align:center;display:none"></div>
      <button id="joinBtn">입장하기</button>
    </div>
  </div>

  <script src="othello.js"></script>
  <script src="seotda.js"></script>
  <script src="app.js"></script>
</body>
</html>
